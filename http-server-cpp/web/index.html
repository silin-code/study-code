<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>前后端分离 HTTP服务器</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {
            font-family: Arial;
            background: #f0f2f5;
            padding: 40px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2d8cf0;
            text-align: center;
            margin-bottom: 20px;
        }
        .hello {
            font-size: 28px;
            color: #00b42a;
            text-align: center;
            margin: 30px 0;
        }
        .tip {
            text-align: center;
            color: #666;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>C++ 前后端分离 HTTP 服务器</h1>
        <div class="hello">👋 Hello World</div>
        <div class="tip">前端文件独立存放在 web/ 文件夹，后端仅负责读取！</div>
    </div>
</body>
</html>
